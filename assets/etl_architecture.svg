<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2050 900" width="2050" height="900" style="background-color:#0D1117; font-family:'Segoe UI', Arial, sans-serif;">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .zone-bg { fill: #161b22; stroke: #30363d; stroke-width: 2; rx: 10; }
      .zone-title { fill: #8b949e; font-size: 15px; font-weight: bold; letter-spacing: 2px; }
      
      .box { fill: #21262d; stroke: #30363d; stroke-width: 2; rx: 6; }
      .box-oracle { stroke: #f85149; }
      .box-csv { stroke: #2ea043; }
      .box-jnr { stroke: #a371f7; }
      .box-mplt { stroke: #3fb950; }
      .box-lkp { stroke: #58a6ff; }
      .box-agg { stroke: #d2a8ff; }
      .box-rtr { stroke: #e3b341; }
      .box-exp { stroke: #79c0ff; }
      .box-tgt { stroke: #56d364; stroke-width: 3; }
      .box-err { stroke: #f85149; stroke-width: 2; stroke-dasharray: 4; }
      
      .text-title { fill: #c9d1d9; font-size: 14px; font-weight: bold; }
      .text-desc { fill: #8b949e; font-family: 'Consolas', monospace; font-size: 12px; }
      .text-small { fill: #8b949e; font-family: 'Consolas', monospace; font-size: 10px; }
      
      .arrow { stroke: #58a6ff; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-err { stroke: #f85149; stroke-width: 3; stroke-dasharray: 5,5; fill: none; marker-end: url(#arrowhead-err); }
      .arrow-clean { stroke: #3fb950; stroke-width: 3; fill: none; marker-end: url(#arrowhead-clean); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
    </marker>
    <marker id="arrowhead-err" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149" />
    </marker>
    <marker id="arrowhead-clean" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="2050" height="900" />
  
  <!-- Zones -->
  <!-- 1. Reference Stream -->
  <rect class="zone-bg" x="20" y="30" width="660" height="320" />
  <text class="zone-title" x="350" y="55" text-anchor="middle">1. REFERENCE DATA STREAM</text>
  
  <!-- 2. ATM Stream -->
  <rect class="zone-bg" x="20" y="370" width="1310" height="150" />
  <text class="zone-title" x="675" y="395" text-anchor="middle">2. ATM COMPLIANCE &amp; AGGREGATION</text>
  
  <!-- 3. CC Stream -->
  <rect class="zone-bg" x="20" y="650" width="880" height="230" />
  <text class="zone-title" x="460" y="675" text-anchor="middle">3. CREDIT CARD SPEND &amp; QUALITY</text>
  
  <!-- 4. Assembly & Target -->
  <rect class="zone-bg" x="1340" y="160" width="680" height="450" />
  <text class="zone-title" x="1680" y="185" text-anchor="middle">4. GOLDEN RECORD ASSEMBLY</text>

  <!-- 5. Audit Log -->
  <rect class="zone-bg" x="890" y="540" width="240" height="90" />
  <text class="zone-title" x="1010" y="560" text-anchor="middle" fill="#f85149">AUDIT LOG</text>

  <!-- PATHS -->
  <path d="M 220 105 C 240 105, 240 105, 260 105" class="arrow" />
  <path d="M 220 205 C 240 205, 240 255, 260 255" class="arrow" />
  <path d="M 220 305 C 240 305, 240 275, 260 275" class="arrow" />
  <path d="M 440 105 C 460 105, 460 170, 480 170" class="arrow" />
  <path d="M 440 255 C 460 255, 460 195, 480 195" class="arrow" />

  <path d="M 220 445 C 240 445, 240 445, 260 445" class="arrow" />
  <path d="M 440 445 C 460 445, 460 445, 480 445" class="arrow" />
  <path d="M 660 445 C 680 445, 680 445, 700 445" class="arrow" />

  <path d="M 880 435 C 900 435, 900 405, 920 405" class="arrow-clean" />
  <path d="M 880 465 C 900 465, 900 585, 920 585" class="arrow-err" />
  <path d="M 1100 405 C 1120 405, 1120 405, 1140 405" class="arrow" />

  <path d="M 220 725 C 240 725, 240 725, 260 725" class="arrow" />
  <path d="M 440 715 C 460 715, 460 725, 480 725" class="arrow-clean" />
  <path d="M 440 745 C 460 745, 460 825, 480 825" class="arrow-err" />
  <path d="M 660 725 C 680 725, 680 725, 700 725" class="arrow" />
  <path d="M 660 825 C 790 825, 790 605, 920 605" class="arrow" />

  <path d="M 1320 405 C 1340 405, 1340 555, 1360 555" class="arrow" />
  <path d="M 880 725 C 1120 725, 1120 585, 1360 585" class="arrow" />

  <path d="M 660 180 C 1120 180, 1120 355, 1580 355" class="arrow" />
  <path d="M 1540 570 C 1560 570, 1560 385, 1580 385" class="arrow" />

  <path d="M 1760 370 C 1780 370, 1780 370, 1800 370" class="arrow" />
  <path d="M 1890 345 L 1890 270" class="arrow" />


  <!-- BOXES -->
  <!-- TRACK 1 -->
  <g class="node">
    <rect class="box box-oracle" x="40" y="80" width="180" height="50"/>
    <text class="text-title" x="130" y="102" text-anchor="middle">SRC_CUSTOMERS</text>
    <text class="text-desc" x="130" y="120" text-anchor="middle">Oracle DB</text>
  </g>
  <g class="node">
    <rect class="box box-oracle" x="40" y="180" width="180" height="50"/>
    <text class="text-title" x="130" y="202" text-anchor="middle">SRC_ACCOUNTS</text>
    <text class="text-desc" x="130" y="220" text-anchor="middle">Oracle DB</text>
  </g>
  <g class="node">
    <rect class="box box-oracle" x="40" y="280" width="180" height="50"/>
    <text class="text-title" x="130" y="302" text-anchor="middle">SRC_BRANCHES</text>
    <text class="text-desc" x="130" y="320" text-anchor="middle">Oracle DB</text>
  </g>
  <g class="node">
    <rect class="box box-mplt" x="260" y="80" width="180" height="50"/>
    <text class="text-title" x="350" y="102" text-anchor="middle">MPLT_Cus_Name</text>
    <text class="text-small" x="350" y="120" text-anchor="middle">Cleanse Full Name</text>
  </g>
  <g class="node">
    <rect class="box box-jnr" x="260" y="230" width="180" height="50"/>
    <text class="text-title" x="350" y="252" text-anchor="middle">JNR_Acct_Branch</text>
    <text class="text-small" x="350" y="270" text-anchor="middle">Join Acct + Branch</text>
  </g>
  <g class="node">
    <rect class="box box-jnr" x="480" y="155" width="180" height="50"/>
    <text class="text-title" x="570" y="177" text-anchor="middle">JNR_Master_Ref</text>
    <text class="text-small" x="570" y="195" text-anchor="middle">Master Reference Data</text>
  </g>

  <!-- TRACK 2 -->
  <g class="node">
    <rect class="box box-csv" x="40" y="420" width="180" height="50"/>
    <text class="text-title" x="130" y="442" text-anchor="middle">SRC_ATM_Regional</text>
    <text class="text-desc" x="130" y="460" text-anchor="middle">ATM Flat Files</text>
  </g>
  <g class="node">
    <rect class="box box-lkp" x="260" y="420" width="180" height="50"/>
    <text class="text-title" x="350" y="442" text-anchor="middle">LKP_Account_Master</text>
    <text class="text-small" x="350" y="460" text-anchor="middle">Verify Account ID</text>
  </g>
  <g class="node">
    <rect class="box box-lkp" x="480" y="420" width="180" height="50"/>
    <text class="text-title" x="570" y="442" text-anchor="middle">LKP_Cust_Compliance</text>
    <text class="text-small" x="570" y="460" text-anchor="middle">Check Suspend/Blacklist</text>
  </g>
  <g class="node">
    <rect class="box box-rtr" x="700" y="420" width="180" height="60"/>
    <text class="text-title" x="790" y="442" text-anchor="middle">RTR_ATM_Compliance</text>
    <text class="text-small" x="790" y="458" text-anchor="middle">Rule: Suspended/Blacklist</text>
    <text class="text-small" x="790" y="470" text-anchor="middle">Rule: Debit Limit</text>
  </g>
  <g class="node">
    <rect class="box box-exp" x="920" y="380" width="180" height="50"/>
    <text class="text-title" x="1010" y="402" text-anchor="middle">EXP_Cast_ATM</text>
    <text class="text-small" x="1010" y="420" text-anchor="middle">Safe Cast to Decimal</text>
  </g>
  <g class="node">
    <rect class="box box-agg" x="1140" y="380" width="180" height="50"/>
    <text class="text-title" x="1230" y="402" text-anchor="middle">AGG_Clean_ATM_Total</text>
    <text class="text-small" x="1230" y="420" text-anchor="middle">SUM(ATM) per CUST_ID</text>
  </g>

  <!-- TRACK 3 -->
  <g class="node">
    <rect class="box box-csv" x="40" y="700" width="180" height="50"/>
    <text class="text-title" x="130" y="722" text-anchor="middle">CC_Spend_2025...</text>
    <text class="text-desc" x="130" y="740" text-anchor="middle">CC Flat Files</text>
  </g>
  <g class="node">
    <rect class="box box-rtr" x="260" y="700" width="180" height="50"/>
    <text class="text-title" x="350" y="722" text-anchor="middle">RTR_CC_Missing_PK</text>
    <text class="text-small" x="350" y="740" text-anchor="middle">Rule: ISNULL(CUST_ID)</text>
  </g>
  <g class="node">
    <rect class="box box-exp" x="480" y="700" width="180" height="50"/>
    <text class="text-title" x="570" y="722" text-anchor="middle">EXP_Cast_Spend</text>
    <text class="text-small" x="570" y="740" text-anchor="middle">Cast Q1-Q4 Metrics</text>
  </g>
  <g class="node">
    <rect class="box box-agg" x="700" y="700" width="180" height="50"/>
    <text class="text-title" x="790" y="722" text-anchor="middle">AGG_CC_Spend_All</text>
    <text class="text-small" x="790" y="740" text-anchor="middle">SUM(Q1..Q4) per CUST</text>
  </g>
  <g class="node">
    <rect class="box box-exp" x="480" y="800" width="180" height="50"/>
    <text class="text-title" x="570" y="822" text-anchor="middle">EXP_Hardcode_PK</text>
    <text class="text-small" x="570" y="840" text-anchor="middle">Set 'MISSING_PK' string</text>
  </g>

  <!-- ERR LOG -->
  <g class="node">
    <rect class="box box-err" x="920" y="570" width="180" height="50"/>
    <text class="text-title" x="1010" y="592" text-anchor="middle" fill="#f85149">TGT_EXCEPTION_LOG</text>
    <text class="text-small" x="1010" y="610" text-anchor="middle">Insert Only</text>
  </g>

  <!-- INTEGRATION & TARGET -->
  <g class="node">
    <rect class="box box-jnr" x="1360" y="540" width="180" height="50"/>
    <text class="text-title" x="1450" y="562" text-anchor="middle">JNR_ATM_CC</text>
    <text class="text-small" x="1450" y="580" text-anchor="middle">Join Aggregated Totals</text>
  </g>
  <g class="node">
    <rect class="box box-jnr" x="1580" y="340" width="180" height="60"/>
    <text class="text-title" x="1670" y="362" text-anchor="middle">JNR_Final_Master</text>
    <text class="text-small" x="1670" y="378" text-anchor="middle">Join Master Ref (P1) +</text>
    <text class="text-small" x="1670" y="390" text-anchor="middle">Aggregated Txns (P4)</text>
  </g>
  <g class="node">
    <rect class="box box-exp" x="1800" y="345" width="180" height="50"/>
    <text class="text-title" x="1890" y="367" text-anchor="middle">EXP_Golden_Metrics</text>
    <text class="text-small" x="1890" y="385" text-anchor="middle">Calc Wallet &amp; Peak Qtr</text>
  </g>
  <g class="node">
    <rect class="box box-tgt" x="1800" y="210" width="180" height="60"/>
    <text class="text-title" x="1890" y="235" text-anchor="middle" fill="#56d364">TGT_CUSTOMER_360</text>
    <text class="text-small" x="1890" y="255" text-anchor="middle">UPSERT</text>
  </g>

</svg>

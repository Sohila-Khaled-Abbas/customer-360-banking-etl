<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" style="background-color:#0D1117; font-family:'Segoe UI', Arial, sans-serif;">
  <defs>
    <style>
      .bg { fill: #0D1117; }
      .zone-bg { fill: #161b22; stroke: #30363d; stroke-width: 2; rx: 10; }
      .zone-title { fill: #8b949e; font-size: 16px; font-weight: bold; letter-spacing: 2px; }
      
      .box { fill: #21262d; stroke: #30363d; stroke-width: 2; rx: 6; }
      .box-oracle { stroke: #f85149; }
      .box-csv { stroke: #2ea043; }
      .box-jnr { stroke: #a371f7; }
      .box-mplt { stroke: #3fb950; }
      .box-agg { stroke: #d2a8ff; }
      .box-rtr { stroke: #e3b341; }
      .box-exp { stroke: #79c0ff; }
      .box-tgt { stroke: #56d364; stroke-width: 3; }
      .box-err { stroke: #f85149; stroke-width: 2; stroke-dasharray: 4; }
      
      .text-title { fill: #c9d1d9; font-size: 16px; font-weight: bold; }
      .text-desc { fill: #8b949e; font-family: 'Consolas', monospace; font-size: 13px; }
      .text-small { fill: #8b949e; font-family: 'Consolas', monospace; font-size: 11px; }
      
      .arrow { stroke: #58a6ff; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-err { stroke: #f85149; stroke-width: 3; stroke-dasharray: 5,5; fill: none; marker-end: url(#arrowhead-err); }
      .arrow-clean { stroke: #3fb950; stroke-width: 3; fill: none; marker-end: url(#arrowhead-clean); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff" />
    </marker>
    <marker id="arrowhead-err" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f85149" />
    </marker>
    <marker id="arrowhead-clean" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950" />
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1600" height="900" />
  
  <!-- Zones -->
  <!-- 1. Source -->
  <rect class="zone-bg" x="30" y="50" width="280" height="800" />
  <text class="zone-title" x="170" y="80" text-anchor="middle">1. SOURCE LAYER</text>
  
  <!-- 2. Integration -->
  <rect class="zone-bg" x="340" y="50" width="280" height="800" />
  <text class="zone-title" x="480" y="80" text-anchor="middle">2. INTEGRATION</text>
  
  <!-- 3. Exception Matrix -->
  <rect class="zone-bg" x="650" y="50" width="320" height="800" />
  <text class="zone-title" x="810" y="80" text-anchor="middle">3. EXCEPTION MATRIX</text>
  
  <!-- 4. Aggregation -->
  <rect class="zone-bg" x="1000" y="50" width="280" height="800" />
  <text class="zone-title" x="1140" y="80" text-anchor="middle">4. AGGREGATION</text>
  
  <!-- 5. Target -->
  <rect class="zone-bg" x="1310" y="50" width="260" height="800" />
  <text class="zone-title" x="1440" y="80" text-anchor="middle">5. TARGET LAYER</text>

  <!-- ZONE 1 BOXES -->
  <text class="text-title" x="170" y="130" text-anchor="middle" fill="#f85149">ORACLE DATABASE</text>
  
  <rect class="box box-oracle" x="50" y="150" width="240" height="50" />
  <text class="text-title" x="170" y="175" text-anchor="middle">SRC_BRANCHES</text>
  <text class="text-desc" x="170" y="190" text-anchor="middle">4 branches</text>

  <rect class="box box-oracle" x="50" y="220" width="240" height="50" />
  <text class="text-title" x="170" y="245" text-anchor="middle">SRC_ACCOUNTS</text>
  <text class="text-desc" x="170" y="260" text-anchor="middle">22 accounts</text>

  <rect class="box box-oracle" x="50" y="290" width="240" height="50" />
  <text class="text-title" x="170" y="315" text-anchor="middle">SRC_CUSTOMERS</text>
  <text class="text-desc" x="170" y="330" text-anchor="middle">15 customers</text>
  
  <line x1="50" y1="360" x2="290" y2="360" stroke="#30363d" stroke-width="2" />
  
  <text class="text-title" x="170" y="390" text-anchor="middle" fill="#2ea043">FLAT FILES (CSV)</text>
  
  <rect class="box box-csv" x="50" y="410" width="240" height="70" />
  <text class="text-title" x="170" y="435" text-anchor="middle">ATM_Txn_*.csv</text>
  <text class="text-desc" x="170" y="455" text-anchor="middle">Alex, Cairo, Giza</text>
  <text class="text-small" x="170" y="470" text-anchor="middle">Daily extracts, mixed formats</text>

  <rect class="box box-csv" x="50" y="500" width="240" height="70" />
  <text class="text-title" x="170" y="525" text-anchor="middle">CC_Spend_*.csv</text>
  <text class="text-desc" x="170" y="545" text-anchor="middle">2023, 2024, 2025</text>
  <text class="text-small" x="170" y="560" text-anchor="middle">Quarterly Q1-Q4 spends</text>


  <!-- ZONE 2 BOXES -->
  <rect class="box box-jnr" x="360" y="200" width="240" height="60" />
  <text class="text-title" x="480" y="225" text-anchor="middle">JNR: Accounts &amp; Branches</text>
  <text class="text-desc" x="480" y="245" text-anchor="middle">Join on BRANCH_ID</text>

  <rect class="box box-jnr" x="360" y="290" width="240" height="60" />
  <text class="text-title" x="480" y="315" text-anchor="middle">JNR: Main Integration</text>
  <text class="text-desc" x="480" y="335" text-anchor="middle">Join Customers on CUST_ID</text>

  <rect class="box box-mplt" x="360" y="380" width="240" height="60" />
  <text class="text-title" x="480" y="405" text-anchor="middle">MPLT_Cleanse_Name</text>
  <text class="text-small" x="480" y="425" text-anchor="middle">LTRIM(RTRIM(REG_REPLACE(...)))</text>

  <rect class="box box-agg" x="360" y="470" width="240" height="60" />
  <text class="text-title" x="480" y="495" text-anchor="middle">AGG: Debit Card Count</text>
  <text class="text-desc" x="480" y="515" text-anchor="middle">Group by CUST_ID</text>

  <rect class="box box-jnr" x="360" y="560" width="240" height="60" />
  <text class="text-title" x="480" y="585" text-anchor="middle">JNR: Count Back</text>
  <text class="text-desc" x="480" y="605" text-anchor="middle">Rejoin count to pipeline</text>


  <!-- ZONE 3 BOXES -->
  <rect class="box box-rtr" x="670" y="250" width="280" height="230" />
  <text class="text-title" x="810" y="280" text-anchor="middle" fill="#e3b341">RTR: EXCEPTION MATRIX</text>
  <line x1="670" y1="295" x2="950" y2="295" stroke="#30363d" stroke-width="2" />
  
  <text class="text-desc" x="685" y="325" text-anchor="start" fill="#f85149">Group 1: ISNULL(CUST_ID)</text>
  <text class="text-desc" x="685" y="365" text-anchor="start" fill="#f85149">Group 2: STATUS='SUSPENDED'</text>
  <text class="text-desc" x="685" y="405" text-anchor="start" fill="#f85149">Group 3: DEBIT_COUNT &gt; 1</text>
  <line x1="670" y1="430" x2="950" y2="430" stroke="#30363d" stroke-width="2" />
  <text class="text-desc" x="685" y="460" text-anchor="start" fill="#3fb950">Default: Clean Records</text>

  <rect class="box box-err" x="690" y="600" width="240" height="100" />
  <text class="text-title" x="810" y="630" text-anchor="middle" fill="#f85149">TGT_EXCEPTION_LOG</text>
  <text class="text-small" x="810" y="650" text-anchor="middle">Audit Table (Insert Only)</text>
  <text class="text-small" x="810" y="670" text-anchor="middle">Records MISSING_PK,</text>
  <text class="text-small" x="810" y="685" text-anchor="middle">SUSPENDED_ACCOUNT_TXN,</text>
  <text class="text-small" x="810" y="700" text-anchor="middle">DEBIT_LIMIT_EXCEEDED</text>


  <!-- ZONE 4 BOXES -->
  <rect class="box box-agg" x="1020" y="360" width="240" height="100" />
  <text class="text-title" x="1140" y="390" text-anchor="middle">AGG: Golden Record</text>
  <text class="text-desc" x="1140" y="415" text-anchor="middle">Group by CUST_ID</text>
  <text class="text-small" x="1140" y="435" text-anchor="middle">SUM(ATM) -&gt; TOTAL_ATM_AMOUNT</text>
  <text class="text-small" x="1140" y="450" text-anchor="middle">SUM(Q1..Q4) -&gt; TOTAL_CC_SPEND</text>

  <rect class="box box-exp" x="1020" y="500" width="240" height="80" />
  <text class="text-title" x="1140" y="530" text-anchor="middle">EXP: Peak Quarter</text>
  <text class="text-desc" x="1140" y="555" text-anchor="middle">Two-Pass DECODE logic</text>
  <text class="text-small" x="1140" y="570" text-anchor="middle">Outputs 'Q1', 'Q2', 'Q3', 'Q4'</text>


  <!-- ZONE 5 BOXES -->
  <rect class="box box-tgt" x="1330" y="380" width="220" height="140" />
  <text class="text-title" x="1440" y="420" text-anchor="middle" fill="#56d364">TGT_CUSTOMER_360</text>
  <line x1="1330" y1="440" x2="1550" y2="440" stroke="#30363d" stroke-width="2" />
  <text class="text-desc" x="1440" y="470" text-anchor="middle">Operation: UPSERT</text>
  <text class="text-desc" x="1440" y="490" text-anchor="middle">Match Key: CUST_ID</text>
  <text class="text-small" x="1440" y="510" text-anchor="middle" fill="#56d364">✓ Golden Record Table</text>


  <!-- CONNECTIONS (ARROWS) -->
  
  <!-- Zone 1 to Zone 2 -->
  <path d="M 290 175 C 325 175, 325 215, 350 215" class="arrow" />
  <path d="M 290 245 C 325 245, 325 230, 350 230" class="arrow" />
  
  <!-- Changed JNR Main arrow because the previous path didn't look right: -->
  <!-- We want an arrow coming from JNR Accounts & Branches down to JNR Main -->
  <path d="M 480 260 L 480 280" class="arrow" />
  
  <!-- Flat files to MPLT_Cleanse_Name -->
  <path d="M 290 445 C 320 445, 320 410, 350 410" class="arrow" />
  <path d="M 290 535 C 310 535, 310 410, 350 410" class="arrow" />
  
  <!-- Customers to JNR Main -->
  <path d="M 290 315 L 350 315" class="arrow" />

  <!-- Flow within Zone 2 -->
  <path d="M 480 350 L 480 370" class="arrow" />
  <path d="M 480 440 L 480 460" class="arrow" />
  <path d="M 480 530 L 480 550" class="arrow" />

  <!-- Zone 2 to Zone 3 -->
  <path d="M 600 590 C 630 590, 630 365, 660 365" class="arrow" />

  <!-- Zone 3 to Zone 3 (Exceptions) -->
  <path d="M 950 320 C 970 320, 970 630, 940 630" class="arrow-err" />
  <path d="M 950 360 C 980 360, 980 650, 940 650" class="arrow-err" />
  <path d="M 950 400 C 990 400, 990 670, 940 670" class="arrow-err" />

  <!-- Zone 3 to Zone 4 (Clean) -->
  <path d="M 950 455 C 990 455, 990 410, 1010 410" class="arrow-clean" />

  <!-- Zone 4 within -->
  <path d="M 1140 460 L 1140 490" class="arrow" />

  <!-- Zone 4 to Target -->
  <path d="M 1260 540 C 1295 540, 1295 450, 1320 450" class="arrow" />

</svg>
